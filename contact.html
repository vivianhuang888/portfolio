<!doctype html>

  <head>

    <title>Contact | VivianHuang</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      .contact-shell {
        max-width: 560px;
        margin: 0 auto;
        padding: clamp(2rem, 6vw, 4rem) 0 1rem;
        text-align: center;
      }

      .contact-header {
        margin-bottom: 1.8rem;
      }

      .contact-header .eyebrow {
        margin-bottom: 0.6rem;
      }

      .contact-title {
        margin: 0;
        font-size: clamp(1.9rem, 4vw, 2.6rem);
        font-weight: 400;
        letter-spacing: 0.01em;
        line-height: 1.2;
      }

      .contact-links {
        list-style: none;
        margin: 0;
        padding: 0;
        display: grid;
        gap: 0.8rem;
      }

      .contact-link {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.7rem;
        text-decoration: none;
        color: var(--text);
        padding: 0.55rem 0.2rem;
        transition: color 0.2s ease, transform 0.2s ease;
      }

      .contact-link:hover,
      .contact-link:focus-visible {
        color: var(--accent);
        transform: translateY(-1px);
      }

      .contact-link svg {
        width: 1.15rem;
        height: 1.15rem;
        stroke: currentColor;
        fill: none;
        stroke-width: 1.8;
        transition: transform 0.2s ease;
      }

      .contact-link:hover svg,
      .contact-link:focus-visible svg {
        transform: scale(1.06);
      }

      .contact-label {
        font-size: 1.03rem;
      }
    </style>
  </head>
